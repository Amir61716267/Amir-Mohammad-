<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amir Mohammad</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(
135deg,
#0f172a,
#111827,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:25px;

overflow:hidden;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

body::before{

content:"";

position:fixed;

width:320px;
height:320px;

background:#00d4ff55;

border-radius:50%;

top:-120px;
left:-120px;

filter:blur(80px);

}

body::after{

content:"";

position:fixed;

width:350px;
height:350px;

background:#7c3aed55;

border-radius:50%;

bottom:-150px;
right:-120px;

filter:blur(90px);

}

.card{

position:relative;

width:370px;

padding:35px;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 25px 50px rgba(0,0,0,.45);

text-align:center;

z-index:10;

}

.profile{

width:155px;
height:155px;

border-radius:50%;

object-fit:cover;

border:4px solid rgba(255,255,255,.9);

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

h1{

margin-top:20px;

color:#fff;

font-size:28px;

font-weight:600;

}

.subtitle{

margin-top:8px;

color:#d0d0d0;

font-size:14px;

letter-spacing:1px;

}

.social{

display:flex;

align-items:center;

justify-content:center;

gap:14px;

margin-top:18px;

padding:16px;

border-radius:18px;

text-decoration:none;

color:#fff;

font-size:17px;

font-weight:500;

transition:.3s;

}

.social:hover{

transform:translateY(-5px);

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

.instagram{
background:#E1306C;
}

.telegram{
background:#229ED9;
}
  .eitaa{
background:#FF9800;
}

.rubika{
background:#00BFA5;
}

.sorush{
background:#1976D2;
}

.social:hover i{
transform:scale(1.15);
transition:.3s;
}

.footer{
margin-top:28px;
color:#d6d6d6;
font-size:13px;
letter-spacing:1px;
}

</style>

</head>

<body>

<div class="card">

<img src="profile.jpg" alt="Profile" class="profile">

<h1>Amir Mohammad</h1>

<p class="subtitle">
Welcome To My Profile
</p>

<a class="social instagram"
href="https://instagram.com/Amir_sh_0008"
target="_blank">

<i class="fa-brands fa-instagram"></i>
<span>Instagram</span>

</a>

<a class="social telegram"
href="https://t.me/Amir_sh_0008"
target="_blank">

<i class="fa-brands fa-telegram"></i>
<span>Telegram</span>

</a>

<a class="social eitaa"
href="https://eitaa.com/Amir_sh_0008"
target="_blank">

<i class="fa-solid fa-paper-plane"></i>
<span>Eitaa</span>

</a>
<a class="social rubika"
href="https://rubika.ir/Amir_sh_0008"
target="_blank">

<i class="fa-solid fa-comments"></i>
<span>Rubika</span>

</a>

<a class="social sorush"
href="https://splus.ir/Amir_sh_0008"
target="_blank">

<i class="fa-solid fa-comment-dots"></i>
<span>Sorush+</span>

</a>

<div class="footer">

Made with ❤️ by
<strong>Amir Mohammad</strong>

</div>

</div>

</body>

</html>
